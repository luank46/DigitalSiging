name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DigitalSigningImproved.sln

      - name: Build
        run: dotnet build DigitalSigningImproved.sln -c Release --no-restore

      - name: Test
        run: dotnet test DigitalSigningImproved.sln -c Release --no-build --verbosity normal
        continue-on-error: false

      - name: Smoke test (staging deploy)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Waiting for API to be ready..."
          sleep 15
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://staging.example.com/health || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/net9.0/
          retention-days: 1

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api
            dockerfile: Dockerfile.api
            context: .
          - name: worker-fileprepare
            dockerfile: Dockerfile.worker
            build-args: WORKER=FilePrepare
          - name: worker-hash
            dockerfile: Dockerfile.worker
            build-args: WORKER=Hash
          - name: worker-provider
            dockerfile: Dockerfile.worker
            build-args: WORKER=Provider
          - name: worker-waiting
            dockerfile: Dockerfile.worker
            build-args: WORKER=Waiting
          - name: worker-append
            dockerfile: Dockerfile.worker
            build-args: WORKER=Append
          - name: worker-upload
            dockerfile: Dockerfile.worker
            build-args: WORKER=Upload
          - name: worker-webhook
            dockerfile: Dockerfile.worker
            build-args: WORKER=Webhook
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build-args }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/digital-signing/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/digital-signing
            docker compose pull
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker system prune -f

  deploy-production:
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          source: "docker-compose.production.yml,.env.production"
          target: "/opt/digital-signing/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/digital-signing
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans --scale api=2
            docker system prune -f
