      args:
        WORKER: Upload
    image: ghcr.io/${GITHUB_REPOSITORY:-digital-signing}/worker-upload:staging
    restart: unless-stopped
    environment:
      SIGNING_ENCRYPTION_KEY: "${SIGNING_ENCRYPTION_KEY:-dev-key-replace-in-production}"
      MongoDb__ConnectionString: "mongodb://admin2:password3real@mongodb:27017"
      MongoDb__DatabaseName: "CHU_KY_DIEN_TU_STAGING"
      RabbitMq__Host: rabbitmq
      RabbitMq__UserName: admin
      RabbitMq__Password: "123456789**"
      Redis__ConnectionString: "redis:6379,password=admin@123"
    depends_on:
      - api
